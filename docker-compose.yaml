version: '3.8'

services:
  # === ІНФРАСТРУКТУРА .NET МОНОЛІТУ ===
  cinema-db:
    image: pgvector/pgvector:pg16
    container_name: cinema-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: cinema_local_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cinema_local_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  cinema-redis:
    image: redis:alpine
    container_name: cinema-redis
    command: redis-server --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Спільний брокер для .NET та NestJS!
  cinema-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cinema-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  # === ІНФРАСТРУКТУРА NESTJS МІКРОСЕРВІСУ ===
  loyalty-db:
    image: postgres:15-alpine
    container_name: cinema_loyalty_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cinema_loyalty_db
    ports:
      - "5433:5432"
    volumes:
      - loyalty_pg_data:/var/lib/postgresql/data

  # === СЕРВІС СІДИНГУ ===
  cinema-seeder:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: cinema-seeder
    restart: "no"
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - SEED__RUN=true
      - SEED__MODE=true
      - ConnectionStrings__DefaultConnection=Host=cinema-db;Port=5432;Database=cinema_local_db;Username=postgres;Password=postgres_password
      - ConnectionStrings__RedisConnection=cinema-redis:6379,password=redis_password
      - RabbitMQ__Host=cinema-rabbitmq
      - SEED_ADMIN__EMAIL=admin@cinema.com
      - SEED_ADMIN__PASSWORD=Admin123!
    entrypoint: ["dotnet", "run", "--project", "Cinema.Api", "--", "--seed"]
    depends_on:
      cinema-db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  loyalty_pg_data: