name: Deploy .NET Backend

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "[DEBUG] Show runner info"
        run: |
          echo "=========================================="
          echo "Runner IP (IPv4):"
          curl -s https://api.ipify.org
          echo ""
          echo "Runner OS: $(uname -a)"
          echo "=========================================="

      - name: "[DEBUG] Test TCP port 22"
        run: |
          echo "=========================================="
          echo "Target host: ${{ secrets.HOST }}"
          echo "Testing port 22 with nc (timeout 10s)..."
          nc -zv -w 10 ${{ secrets.HOST }} 22 \
            && echo "✅ PORT 22 IS OPEN" \
            || echo "❌ PORT 22 IS CLOSED OR TIMEOUT"
          echo "=========================================="

      - name: "[DEBUG] Validate SSH key format"
        run: |
          echo "=========================================="
          echo "Checking SSH key format..."
          echo "${{ secrets.SSH_KEY }}" > /tmp/test_key
          chmod 600 /tmp/test_key
          ssh-keygen -l -f /tmp/test_key \
            && echo "✅ SSH key is VALID" \
            || echo "❌ SSH key is INVALID or wrong format"
          rm -f /tmp/test_key
          echo "=========================================="

      - name: "[DEBUG] Test SSH handshake (verbose)"
        run: |
          echo "=========================================="
          echo "Testing SSH connection with verbose output..."
          echo "${{ secrets.SSH_KEY }}" > /tmp/test_key
          chmod 600 /tmp/test_key
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o BatchMode=yes \
            -i /tmp/test_key \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            "echo '✅ SSH CONNECTION SUCCESSFUL'" \
            2>&1 | head -50
          rm -f /tmp/test_key
          echo "=========================================="

      - name: Clean remote backend workspace (remove stale files)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            echo "Cleaning /root/cinema-platform/backend ..."
            rm -rf /root/cinema-platform/backend
            mkdir -p /root/cinema-platform/backend

      - name: Copy files via SSH (fresh sync)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/root/cinema-platform/backend"

      - name: Build and Restart .NET Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /root/cinema-platform
            echo "=========================================="
            echo "[Server] Building & starting cinema-api via docker compose..."
            # Використовуємо --no-cache для білду, якщо хочеш 100% застрахуватись від фантомного кешу
            docker compose build --no-cache cinema-api
            docker compose up -d cinema-api
            echo "[Server] Pruning unused images..."
            docker image prune -f
            echo "=========================================="